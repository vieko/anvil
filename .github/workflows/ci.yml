name: ci

on:
  push:
    branches: [main]
  pull_request:

permissions:
  contents: read

jobs:
  check:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm
      - run: npm ci
      # One gate: biome -> tsc --noEmit -> build -> test (real git worktrees,
      # faux-model e2e -- no API key required).
      - run: npm run check
