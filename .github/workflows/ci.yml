name: ci

on:
  push:
    branches: [main]
  pull_request:

permissions:
  contents: read

jobs:
  check:
    runs-on: ubuntu-latest
    strategy:
      matrix:
        # The supported range: the engines floor (22) and the current Active LTS (24).
        node: [22, 24]
    steps:
      - uses: actions/checkout@v5
      - uses: actions/setup-node@v5
        with:
          node-version: ${{ matrix.node }}
          cache: npm
      - run: npm ci
      # One gate: biome -> tsc --noEmit -> build -> test (real git worktrees,
      # faux-model e2e -- no API key required).
      - run: npm run check
